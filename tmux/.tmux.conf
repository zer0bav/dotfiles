# --- BOOTSTRAP TPM ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# --- SYSTEM & CORE ---
set-option -sa terminal-overrides ",xterm*:Tc"
set -s default-terminal "tmux-256color"
set -g mouse on

# --- CUSTOM WINDOW RENAME LOGIC ---
set -g @lock_icon "󰓹"
set -g automatic-rename on

# DISPLAY FORMAT (With 20 character limit)
set -g automatic-rename-format "#{=20:?#{==:#{=1:window_name},#{@lock_icon}},#{window_name},#{?#{==:#{pane_current_command},nvim},#{b:pane_title},#{pane_current_command}}}"

# RENAME SHORTCUT
bind , command-prompt -p "(Rename Window)" \
  "if-shell \"[ -n '%1' ]\" \
  \"rename-window '#{@lock_icon} %1'\" \
  \"rename-window ''\" ; \
  set-window-option automatic-rename on"

# --- RELOAD CONFIGURATION ---
bind r source-file ~/.tmux.conf \; display " Configuration reloaded"

# --- PREFIX ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- INDEXES ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- IMAGES & GRAPHICS ---
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# --- VI MODE & NAVIGATION ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# --- SPLITS ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- STATUS BAR (DRACULA ROUNDED SIDES, SQUARE CENTER) ---
set -g status-position top
set -g status on
set -g status-interval 1
set -g status-style "bg=default,fg=#f8f8f2"
set -g status-justify centre
set -g status-left-length 220
set -g status-right-length 280

# LEFT GROUP: Nested round pill with Dracula colors: [  Session ][ #S ][ CPU  MEM  GPU ] + [ Network ] + [ Target IP ]
set -g status-left '#[bg=default]#[fg=#44475a]#[bg=#44475a]#[fg=#8be9fd]#[bold]  Session #[bg=#6272a4]#[fg=#f8f8f2]#[bold] #S #[bg=#282a36]#(bash ~/.tmux/status_sys.sh) #[bg=default]#[fg=#282a36]  #(bash ~/.tmux/status_net.sh)  #(bash ~/.tmux/target.sh)'

# RIGHT GROUP: Nested round pill: [ Battery ] + [ User ] + [ + ][ x ][ ■ Date ][ ● Time ]
set -g status-right '#{?window_zoomed_flag,#[bg=#ff5555]#[fg=#f8f8f2]#[bold] ZOOM #[bg=default]  ,}#{?pane_in_mode,#[bg=#ffb86c]#[fg=#111111]#[bold] COPY #[bg=default]  ,}#{?pane_synchronized,#[bg=#8be9fd]#[fg=#111111]#[bold] SYNC #[bg=default]  ,}#(bash ~/.tmux/status_bat.sh)  #[fg=#44475a]#[bg=#44475a]#[fg=#bd93f9]#[bold]  #(whoami) #[bg=default]#[fg=#44475a]  #[bg=default]#[fg=#282a36]#[bg=#282a36]#[range=user|new_window]#[fg=#50fa7b]#[bold] + #[norange] #[range=user|kill_window]#[fg=#ff5555]#[bold]x #[norange]#[bg=#44475a]#[fg=#f8f8f2]#[bold] ■ %d %b, %Y #[bg=#6272a4]#[fg=#f8f8f2]#[bold] ● %H:%M:%S #[bg=default]#[fg=#6272a4]'

# Click handlers for [+] and [x] status bar buttons
bind -T root MouseDown1Status if -F '#{==:#{mouse_status_range},new_window}' {
    new-window -c "#{pane_current_path}"
} {
    if -F '#{==:#{mouse_status_range},kill_window}' {
        confirm-before -p "Kill window #W? (y/n)" kill-window
    }
}

# WINDOWS - rectangular segments (center)
bind c new-window -c "#{pane_current_path}"
bind + new-window -c "#{pane_current_path}"
bind x confirm-before -p "Kill window #W? (y/n)" kill-window
bind X confirm-before -p "Kill window #W? (y/n)" kill-window
set -g window-status-separator " "
set -g window-status-style "bg=default,fg=#f8f8f2"

# Inactive Window: [ ○ #I #W ]
set -g window-status-format "#[fg=#f8f8f2]#[bg=#44475a] ○ #I #W "

# Active Window: [ ◉ #I #W ] (Changes color to red if prefix is pressed)
set -g window-status-current-format "#{?client_prefix,#[fg=#111111]#[bg=#ff5555]#[bold] ◉ #I #W ,#[fg=#111111]#[bg=#bd93f9]#[bold] ◉ #I #W }"

set -g window-status-activity-style "bg=default,fg=#ff79c6"
set -g window-status-bell-style "bg=default,fg=#f7e0bf"

# --- DRACULA PANE BORDERS & SELECTION ---
set -g pane-border-style "fg=#44475a,bg=default"
set -g pane-active-border-style "fg=#bd93f9,bg=default"
set -g message-style "bg=#44475a,fg=#8be9fd,bold"
set -g message-command-style "bg=#44475a,fg=#8be9fd,bold"
set -g mode-style "bg=#44475a,fg=#ff79c6,bold"

# --- CYBERSECURITY BINDINGS (TARGET IP & INTERFACE CHOOSER) ---
# prefix + t to set Target IP, prefix + Ctrl-t to clear
bind-key t command-prompt -p "Target IP:" "run-shell 'bash ~/.tmux/target.sh \"%1\"'"
bind-key C-t run-shell 'bash ~/.tmux/target.sh clear'

# prefix + a to select which network interface's IP to display on status line
bind-key a run-shell 'bash ~/.tmux/choose_interface.sh'


# --- POPUPS ---
bind N display-popup -E -w 90% -h 90% "nvim -R ~/.config/nvim/README.md"
bind T display-popup -E -w 90% -h 90% "nvim -R ~/.lyne-dots/tmux/README.md"

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'mrjones2014/tmux-smart-splits'

# --- INTEGRATION LOGIC (SMART SPLITS) ---
# Checks if the current pane is running Vim/Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# NAVIGATION (Ctrl + h/j/k/l)
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# RESIZING (Alt + h/j/k/l)
bind-key -n M-h if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'

# SWAP POSITION (Ctrl + Shift + h/j/k/l)
bind-key -n C-S-h swap-pane -d -t "{left-of}"
bind-key -n C-S-j swap-pane -d -t "{down-of}"
bind-key -n C-S-k swap-pane -d -t "{up-of}"
bind-key -n C-S-l swap-pane -d -t "{right-of}"

# WINDOW/TAB NAVIGATION (Ctrl + Alt + h/l)
bind-key -n C-M-h previous-window
bind-key -n C-M-l next-window

# --- ZEN SIDEBAR ---
# prefix + b → sidebar
bind b display-popup -E -x R -w 35% -h 100% \
  -S "fg=#bd93f9" -s "bg=#282a36" "~/.tmux/sidebar.sh"
bind -n MouseDown1StatusLeft display-popup -E -x R -w 35% -h 100% \
  -S "fg=#bd93f9" -s "bg=#282a36" "~/.tmux/sidebar.sh"

# Direct shortcuts (no need to open sidebar first)
# prefix + g → git status popup
bind g display-popup -E -w 80% -h 80% \
  -S "fg=#bd93f9" -s "bg=#282a36" \
  'cd "#{pane_current_path}" && git status && echo "" && git log --oneline -10 && echo "" && echo "press any key..." && read -rsn1'

# prefix + p → pomodoro quick toggle
bind p display-popup -E -w 40% -h 50% \
  -S "fg=#bd93f9" -s "bg=#282a36" \
  'bash -c "source ~/.tmux/sidebar.sh 2>/dev/null; DATA=$HOME/.tmux/data; pomo_menu"'

# prefix + ? → keybindings
bind ? display-popup -E -w 50% -h 70% \
  -S "fg=#bd93f9" -s "bg=#282a36" \
  'bash -c "source ~/.tmux/sidebar.sh 2>/dev/null; handle_action help"'

# --- TPM Initialization ---
run '~/.tmux/plugins/tpm/tpm'
